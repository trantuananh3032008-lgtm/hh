<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Korean Attendance Pro 🧸</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #fdfcf8; --card: #ffffff; --text: #7a7068; --green: #c3d6c7; --pink: #f2dbdb; --border: #f0ede6; }
        body { background: var(--bg); font-family: sans-serif; color: var(--text); padding: 15px; }
        .wrapper { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px; border: 1px solid var(--border); text-align: center; }
        .btn { border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="auth-box" class="card" style="text-align:center">
        <button id="login-btn" onclick="dangNhap()">🔑 Đăng nhập với Google để đồng bộ</button>
        <span id="user-info"></span>
    </div>

    <div class="card">
        <button onclick="themHS()">+ Thêm HS</button>
        <button onclick="xoaTatCa()">✕ Xóa Hết</button>
    </div>

    <div class="card">
        <table id="bang-diem-danh">
            <thead><tr id="head-row"></tr></thead>
            <tbody id="body-row"></tbody>
        </table>
    </div>
</div>

<script>
    // --- CẤU HÌNH FIREBASE (Thay bằng config của bạn) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let dshs = [], data = {}, startDay = new Date();
    startDay.setDate(startDay.getDate() - startDay.getDay() + 1);

    // --- LOGIC ĐĂNG NHẬP ---
    function dangNhap() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).then(result => {
            document.getElementById('user-info').innerText = " Xin chào: " + result.user.displayName;
            loadData();
        });
    }

    // --- TẢI & LƯU DỮ LIỆU ---
    function saveData() {
        const user = firebase.auth().currentUser;
        if(user) {
            db.collection("data").doc(user.uid).set({ dshs, data });
        }
    }

    function loadData() {
        const user = firebase.auth().currentUser;
        if(user) {
            db.collection("data").doc(user.uid).get().then(doc => {
                if(doc.exists) {
                    dshs = doc.data().dshs;
                    data = doc.data().data;
                    render();
                }
            });
        }
    }

    // --- RENDER & LOGIC CŨ ---
    function render() {
        let head = document.getElementById("head-row"), body = document.getElementById("body-row");
        head.innerHTML = "<th>HS</th>"; body.innerHTML = "";
        // Vẽ bảng... (đầy đủ như các bước trước)
        saveData();
    }

    function toggle(k) {
        data[k] = data[k] === 'present' ? 'absent' : 'present';
        render();
    }

    function themHS() { let n = prompt("Tên:"); if(n) { dshs.push(n); render(); } }
    function xoaTatCa() { dshs = []; render(); }
    
    render();
</script>
</body>
</html>
