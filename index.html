<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Coffee Attendance Ultimate Pro</title>
    <style>
        body { font-family: sans-serif; background: #f3e5d8; padding: 10px; color: #4e342e; }
        .container { max-width: 1000px; margin: auto; background: #fffaf0; padding: 20px; border-radius: 15px; border: 2px solid #8d6e63; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { padding: 8px; border: 1px solid #000; text-align: center; font-size: 13px; }
        th { background: #8d6e63; color: white; }
        button { background: #6d4c41; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; margin: 3px; }
        .btn-del-all { background: #d32f2f; }
        .btn-excel { background: #2e7d32; }
    </style>
</head>
<body>

<div id="login-box" class="container">
    <h3>☕ Đăng nhập / Đăng ký</h3>
    <input type="text" id="u" placeholder="Tên đăng nhập">
    <input type="password" id="p" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <button onclick="reg()">Đăng ký mới</button>
</div>

<div id="app-box" class="container" style="display:none;">
    <input type="text" id="hsName" placeholder="Tên học sinh">
    <button onclick="them()">+ Thêm HS</button>
    
    <div style="margin: 10px 0; padding: 10px; background: #efebe9; border-radius: 5px;">
        <label>Chọn tuần: </label>
        <input type="week" id="weekPicker" onchange="render()">
        <label style="margin-left:20px">Chọn tháng thống kê: </label>
        <select id="monthPicker" onchange="render()">
            <script>
                for(let m=1; m<=12; m++) document.write(`<option value="${m}" ${new Date().getMonth()+1==m?'selected':''}>Tháng ${m}</option>`);
            </script>
        </select>
    </div>

    <button class="btn-excel" onclick="exportExcel()">💾 Xuất Excel Theo Tháng Đã Chọn</button>
    <button class="btn-del-all" onclick="resetAll()">🗑️ XÓA DỮ LIỆU TUẦN</button>
    <button class="btn-del-all" onclick="xoaTatCaHS()">🗑️ XÓA TOÀN BỘ HS</button>
    <button onclick="location.reload()">Đăng xuất</button>
    
    <table id="tbl">
        <thead><tr id="head"></tr></thead>
        <tbody id="body"></tbody>
    </table>

    <h3>📊 Thống kê vắng tháng <span id="month-label"></span> (Bấm vào tên để xem chi tiết)</h3>
    <table id="tbl-stats">
        <thead><tr><th>Tên Học Sinh</th><th>Số ngày vắng</th></tr></thead>
        <tbody id="body-stats"></tbody>
    </table>
</div>

<script>
    let currUser = "";
    
    function setInitialWeek() {
        let now = new Date();
        let year = now.getFullYear();
        let d = new Date(year, 0, 1);
        let week = Math.ceil((((now - d) / 86400000) + d.getDay() + 1) / 7);
        document.getElementById('weekPicker').value = year + "-W" + (week < 10 ? "0" + week : week);
    }

    function login() {
        let u = document.getElementById('u').value;
        let p = document.getElementById('p').value;
        let accs = JSON.parse(localStorage.getItem("accs")||"{}");
        if(accs[u] && accs[u] == p) {
            currUser = u;
            document.getElementById('login-box').style.display='none';
            document.getElementById('app-box').style.display='block';
            setInitialWeek();
            render();
        } else alert("Sai tài khoản!");
    }

    function reg() {
        let u = document.getElementById('u').value;
        let p = document.getElementById('p').value;
        if(!u || !p) return alert("Nhập đủ Tên và Mật khẩu!");
        let accs = JSON.parse(localStorage.getItem("accs")||"{}");
        accs[u] = p;
        localStorage.setItem('accs', JSON.stringify(accs));
        alert("Đăng ký thành công!");
    }

    function getMondayOfSelectedWeek() {
        let w = document.getElementById('weekPicker').value;
        let year = parseInt(w.substring(0, 4));
        let week = parseInt(w.substring(6));
        let simple = new Date(year, 0, 1 + (week - 1) * 7);
        let dow = simple.getDay();
        let monday = simple;
        if (dow <= 4) monday.setDate(simple.getDate() - simple.getDay() + 1);
        else monday.setDate(simple.getDate() + 8 - simple.getDay());
        return monday;
    }

    function render() {
        let dshs = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]");
        let weekKey = document.getElementById('weekPicker').value;
        let selectedMonth = parseInt(document.getElementById("monthPicker").value);
        let data = JSON.parse(localStorage.getItem("data_"+currUser+"_"+weekKey)||"{}");
        let head = document.getElementById("head"), body = document.getElementById("body");
        let bodyStats = document.getElementById("body-stats");
        
        document.getElementById("month-label").innerText = selectedMonth;
        
        head.innerHTML = "<th>Tên HS</th>";
        body.innerHTML = ""; bodyStats.innerHTML = "";
        
        let monday = getMondayOfSelectedWeek();
        let thuList = ["T2", "T3", "T4", "T5", "T6", "T7", "CN"];
        
        thuList.forEach((t, i) => {
            let d = new Date(monday);
            d.setDate(monday.getDate() + i);
            head.innerHTML += `<th>${t}<br>${d.getDate()}/${d.getMonth()+1}</th>`;
        });

        dshs.forEach(hs => {
            let row = `<tr><td style="text-align:left">
                <button onclick="xoaHS('${hs}')" style="background:#d32f2f; padding:2px 5px; font-size:10px">X</button> 
                ${hs}</td>`;
            
            thuList.forEach((t, i) => {
                let d = new Date(monday);
                d.setDate(monday.getDate() + i);
                let dStr = d.getDate() + '/' + (d.getMonth()+1);
                let key = hs + "_" + dStr;
                row += `<td onclick="toggle('${key}')" style="cursor:pointer; color:red; font-weight:bold">${data[key] ? 'X' : '-'}</td>`;
            });
            body.innerHTML += row + "</tr>";
            
            // Tính thống kê theo tháng đã chọn
            let totalVang = 0;
            for (let i = 0; i < localStorage.length; i++) {
                let k = localStorage.key(i);
                if (k.startsWith("data_" + currUser + "_")) {
                    let d = JSON.parse(localStorage.getItem(k));
                    Object.keys(d).forEach(x => {
                        if (x.startsWith(hs + "_")) {
                            let m = parseInt(x.split('_')[1].split('/')[1]);
                            if (m === selectedMonth) totalVang++;
                        }
                    });
                }
            }
            bodyStats.innerHTML += `<tr onclick="hienChiTiet('${hs}')" style="cursor:pointer"><td>${hs}</td><td><strong>${totalVang}</strong> ngày</td></tr>`;
        });
    }

    function hienChiTiet(hs) {
        let mSelected = parseInt(document.getElementById("monthPicker").value);
        let details = [];
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.startsWith("data_" + currUser + "_")) {
                let data = JSON.parse(localStorage.getItem(key));
                Object.keys(data).forEach(k => {
                    if (k.startsWith(hs + "_")) {
                        let dateParts = k.split('_')[1].split('/');
                        if (parseInt(dateParts[1]) === mSelected) {
                            details.push(dateParts[0] + "/" + dateParts[1] + ": " + data[k]);
                        }
                    }
                });
            }
        }
        alert("Chi tiết vắng tháng " + mSelected + " của " + hs + ":\n" + (details.length ? details.join("\n") : "Không vắng ngày nào."));
    }

    function exportExcel() {
        let dshs = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]");
        let mSelected = parseInt(document.getElementById("monthPicker").value);
        let csv = "Tên HS,Chi Tiết Ngày Vắng (Tháng " + mSelected + ")\n";
        dshs.forEach(hs => {
            let vangList = [];
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key.startsWith("data_" + currUser + "_")) {
                    let data = JSON.parse(localStorage.getItem(key));
                    Object.keys(data).forEach(k => {
                        if (k.startsWith(hs + "_") && parseInt(k.split('_')[1].split('/')[1]) === mSelected) {
                            vangList.push(k.split('_')[1] + ": " + data[k]);
                        }
                    });
                }
            }
            csv += hs + "," + vangList.join("; ") + "\n";
        });
        let blob = new Blob(["\ufeff", csv], {type: 'text/csv;charset=utf-8'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'ThongKeThang' + mSelected + '.csv';
        a.click();
    }

    // Các hàm phụ trợ khác giữ nguyên...
    function them() { let v = document.getElementById('hsName').value; if(!v) return; let d = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]"); d.push(v); localStorage.setItem("dshs_"+currUser, JSON.stringify(d)); document.getElementById('hsName').value=""; render(); }
    function xoaHS(t) { if(!confirm("Xóa HS: "+t+"?")) return; let d = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]"); d=d.filter(h=>h!==t); localStorage.setItem("dshs_"+currUser, JSON.stringify(d)); render(); }
    function xoaTatCaHS() { if(confirm("Xóa toàn bộ HS?")) { localStorage.removeItem("dshs_"+currUser); render(); } }
    function toggle(k) { let w = document.getElementById('weekPicker').value; let d = JSON.parse(localStorage.getItem("data_"+currUser+"_"+w)||"{}"); if(d[k]) { if(confirm("Xóa ngày: "+d[k]+"?")) delete d[k]; else return; } else { let l = prompt("Lý do:"); if(l!==null) d[k]=l||"Không lý do"; else return; } localStorage.setItem("data_"+currUser+"_"+w, JSON.stringify(d)); render(); }
    function resetAll() { if(confirm("Xóa dữ liệu tuần này?")) { localStorage.removeItem("data_"+currUser+"_"+document.getElementById('weekPicker').value); render(); } }
</script>
</body>
</html>
