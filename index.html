<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Coffee Attendance Ultimate Pro</title>
    <style>
        body { font-family: sans-serif; background: #f3e5d8; padding: 10px; color: #4e342e; }
        .container { max-width: 1000px; margin: auto; background: #fffaf0; padding: 20px; border-radius: 15px; border: 2px solid #8d6e63; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { padding: 8px; border: 1px solid #000; text-align: center; font-size: 13px; }
        th { background: #8d6e63; color: white; }
        button { background: #6d4c41; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; margin: 3px; }
        .btn-del-all { background: #d32f2f; }
        .btn-excel { background: #2e7d32; }
    </style>
</head>
<body>

<div id="login-box" class="container">
    <h3>☕ Đăng nhập / Đăng ký</h3>
    <input type="text" id="u" placeholder="Tên đăng nhập">
    <input type="password" id="p" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
    <button onclick="reg()">Đăng ký mới</button>
</div>

<div id="app-box" class="container" style="display:none;">
    <input type="text" id="hsName" placeholder="Tên học sinh">
    <button onclick="them()">+ Thêm HS</button>
    <button class="btn-excel" onclick="exportExcel()">💾 Xuất Excel</button>
    <button class="btn-del-all" onclick="resetAll()">🗑️ XÓA TẤT CẢ HS</button>
    <button onclick="location.reload()">Đăng xuất</button>
    
    <table id="tbl">
        <thead><tr id="head"></tr></thead>
        <tbody id="body"></tbody>
    </table>

    <h3>📊 Thống kê chi tiết (Bấm vào tên để xem lý do)</h3>
    <table id="tbl-stats">
        <thead><tr><th>Tên Học Sinh</th><th>Tổng Số Ngày Vắng</th></tr></thead>
        <tbody id="body-stats"></tbody>
    </table>
</div>

<script>
    let currUser = "";
    
    function login() {
        let u = document.getElementById('u').value;
        let p = document.getElementById('p').value;
        let accs = JSON.parse(localStorage.getItem("accs")||"{}");
        if(accs[u] && accs[u] == p) {
            currUser = u;
            document.getElementById('login-box').style.display='none';
            document.getElementById('app-box').style.display='block';
            render();
        } else alert("Sai tài khoản hoặc mật khẩu!");
    }

    function reg() {
        let u = document.getElementById('u').value;
        let p = document.getElementById('p').value;
        if(!u || !p) return alert("Nhập đủ Tên và Mật khẩu!");
        let accs = JSON.parse(localStorage.getItem("accs")||"{}");
        accs[u] = p;
        localStorage.setItem('accs', JSON.stringify(accs));
        alert("Đăng ký thành công!");
    }

    function getMonday() {
        let d = new Date();
        let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    }

    function render() {
        let dshs = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]");
        let data = JSON.parse(localStorage.getItem("data_"+currUser)||"{}");
        let head = document.getElementById("head"), body = document.getElementById("body");
        let bodyStats = document.getElementById("body-stats");
        
        head.innerHTML = "<th>Tên HS</th>";
        body.innerHTML = ""; bodyStats.innerHTML = "";
        
        let monday = getMonday();
        let dates = [];
        let thuList = ["T2", "T3", "T4", "T5", "T6", "T7", "CN"];
        
        for(let j=0; j<7; j++) {
            let d = new Date(monday);
            d.setDate(monday.getDate() + j);
            let dStr = d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
            dates.push({full: d.toDateString(), label: dStr, thu: thuList[j]});
            head.innerHTML += `<th>${thuList[j]}<br>${dStr}</th>`;
        }

        dshs.forEach((t, i) => {
            let row = `<tr><td>${t} <button onclick="xoaHs('${t}')" style="background:red">x</button></td>`;
            dates.forEach(d => {
                let k = d.full + "_" + t;
                row += `<td onclick="toggle('${k}', '${d.label}')" style="cursor:pointer; color:${data[k]?'red':'black'}">${data[k]?'X':'-'}</td>`;
            });
            body.innerHTML += row + "</tr>";

            let v = Object.keys(data).filter(k => k.endsWith(t));
            bodyStats.innerHTML += `<tr onclick="hienChiTiet('${t}')" style="cursor:pointer; background:#fff">
                <td>${t}</td><td>${v.length} ngày</td>
            </tr>`;
        });
    }

    function hienChiTiet(t) {
        let data = JSON.parse(localStorage.getItem("data_"+currUser)||"{}");
        let v = Object.keys(data).filter(k => k.endsWith(t));
        if(v.length === 0) alert(t + " đi học đầy đủ.");
        else {
            let list = v.map(k => {
                let d = new Date(k.split('_')[0]);
                let thu = ["CN", "Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"][d.getDay()];
                let dStr = d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
                return "- " + thu + ", " + dStr + ": " + data[k];
            }).join("\n");
            alert("Chi tiết vắng của " + t + ":\n\n" + list);
        }
    }

    function toggle(k, label) {
        let data = JSON.parse(localStorage.getItem("data_"+currUser)||"{}");
        if(data[k]) {
            if(confirm("Xóa trạng thái ngày " + label + "?")) delete data[k];
            else return;
        } else {
            let lyDo = prompt("Nhập lý do vắng ngày " + label + ":");
            data[k] = lyDo || "Không lý do";
        }
        localStorage.setItem('data_'+currUser, JSON.stringify(data));
        render();
    }

    function exportExcel() {
        let dshs = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]");
        let data = JSON.parse(localStorage.getItem("data_"+currUser)||"{}");
        let csv = "Hoc Sinh,Ngay,Ly Do\n";
        dshs.forEach(t => {
            Object.keys(data).filter(k => k.endsWith(t)).forEach(k => {
                csv += `${t},${k.split('_')[0]},"${data[k]}"\n`;
            });
        });
        let blob = new Blob(["\ufeff", csv], {type: 'text/csv;charset=utf-8'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'BaoCao_DiemDanh.csv';
        a.click();
    }

    function them() {
        let val = document.getElementById('hsName').value;
        if(!val) return;
        let dshs = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]");
        dshs.push(val);
        localStorage.setItem("dshs_"+currUser, JSON.stringify(dshs));
        document.getElementById('hsName').value = "";
        render();
    }

    function xoaHs(name) {
        let dshs = JSON.parse(localStorage.getItem("dshs_"+currUser)||"[]");
        dshs = dshs.filter(h => h !== name);
        localStorage.setItem("dshs_"+currUser, JSON.stringify(dshs));
        render();
    }

    function resetAll() { if(confirm("XÓA TẤT CẢ DỮ LIỆU?")) { localStorage.removeItem("dshs_"+currUser); localStorage.removeItem("data_"+currUser); render(); } }
</script>
</body>
</html>
