<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Điểm Danh Đơn Giản</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #333; }
        table {
            border-collapse: collapse;
            width: 80%;
            max-width: 600px;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-present { background-color: #e2e2e2; color: #333; }
        .btn-absent { background-color: #e2e2e2; color: #333; }
        
        /* Màu khi được chọn */
        .present { background-color: #2ecc71 !important; color: white; }
        .absent { background-color: #e74c3c !important; color: white; }

        .btn-submit {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
        }
        .btn-submit:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h2>📋 DANH SÁCH ĐIỂM DANH LỚP</h2>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ và Tên</th>
                <th>Điểm danh</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Nguyễn Văn A</td>
                <td>
                    <button class="btn btn-present" onclick="diemDanh(this, 'present')">Có mặt</button>
                    <button class="btn btn-absent" onclick="diemDanh(this, 'absent')">Vắng</button>
                </td>
            </tr>
            <tr>
                <td>2</td>
                <td>Trần Thị B</td>
                <td>
                    <button class="btn btn-present" onclick="diemDanh(this, 'present')">Có mặt</button>
                    <button class="btn btn-absent" onclick="diemDanh(this, 'absent')">Vắng</button>
                </td>
            </tr>
            <tr>
                <td>3</td>
                <td>Lê Văn C</td>
                <td>
                    <button class="btn btn-present" onclick="diemDanh(this, 'present')">Có mặt</button>
                    <button class="btn btn-absent" onclick="diemDanh(this, 'absent')">Vắng</button>
                </td>
            </tr>
        </tbody>
    </table>

    <button class="btn btn-submit" onclick="hoanThanh()">Xác Nhận Điểm Danh</button>

    <script>
        // Hàm xử lý khi bấm nút Có mặt / Vắng
        function diemDanh(button, status) {
            // Tìm hàng (row) chứa nút vừa bấm
            let parentTd = button.parentElement;
            let buttons = parentTd.getElementsByClassName('btn');
            
            // Reset màu của cả 2 nút trong hàng đó về bình thường
            buttons[0].classList.remove('present');
            buttons[1].classList.remove('absent');
            
            // Thêm màu mới tùy thuộc vào nút được bấm
            if (status === 'present') {
                button.classList.add('present');
            } else {
                button.classList.add('absent');
            }
        }

        // Hàm xử lý khi bấm nút Xác Nhận
        function hoanThanh() {
            alert("Đã ghi nhận điểm danh thành công! (Dữ liệu hiện tại sẽ mất khi bạn tải lại trang vì chưa có cơ sở dữ liệu)");
        }
    </script>

</body>
</html>
